<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps & Juegos | Rodolfo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-gray-100 font-sans p-6">
    <div class="max-w-4xl mx-auto">
        <a href="index.html" class="text-blue-500 text-sm mb-4 inline-block hover:underline">← Volver al Panel Maestro</a>
        
        <header class="border-b border-gray-800 pb-6 mb-10 text-center">
            <h1 class="text-3xl font-bold text-blue-500 uppercase tracking-tighter text-white">🎮 Módulo Apps & Juegos</h1>
            <p class="text-gray-500 text-xs mt-2">Monetización vía Play Store & Kotlin</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-gray-900 border border-gray-800 p-6 rounded-3xl relative overflow-hidden">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="font-bold text-xl">Car Wash Game</h3>
                    <span class="bg-blue-900 text-blue-200 text-[10px] px-2 py-1 rounded">DESARROLLO</span>
                </div>
                <p class="text-sm text-gray-400 mb-4 italic">Estado: Trabajando en CarWashActivity.kt</p>
                <div class="w-full bg-gray-800 h-2 rounded-full">
                    <div class="bg-blue-500 h-full" style="width: 40%"></div>
                </div>
            </div>

            <div class="bg-gray-900 border border-dashed border-gray-700 p-6 rounded-3xl flex flex-col items-center justify-center text-gray-600">
                <span class="text-2xl mb-2">+</span>
                <p class="text-xs uppercase font-bold">Nueva Idea de App</p>
            </div>
        </div>

        <div class="bg-gray-900 rounded-3xl border border-gray-800 overflow-hidden shadow-2xl">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-800 text-gray-400 text-[10px] uppercase">
                    <tr>
                        <th class="px-6 py-4">Aplicación</th>
                        <th class="px-6 py-4">Ads (AdMob)</th>
                        <th class="px-6 py-4 text-right">Ganancia</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-800">
                    <tr>
                        <td class="px-6 py-4">Car Wash Game</td>
                        <td class="px-6 py-4 text-gray-500">No vinculado</td>
                        <td class="px-6 py-4 text-right font-mono">$0.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
