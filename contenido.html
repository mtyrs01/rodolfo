<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Contenido | Rodolfo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-gray-100 font-sans p-6">
    <div class="max-w-4xl mx-auto">
        <a href="index.html" class="text-blue-500 text-sm mb-4 inline-block hover:underline">← Volver al Panel Maestro</a>
        
        <header class="border-b border-gray-800 pb-6 mb-10">
            <h1 class="text-3xl font-bold text-red-500">MÓDULO DE CONTENIDO</h1>
            <p class="text-gray-500">Gestión de Monetización en Redes Sociales</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800">
                <p class="text-xs text-gray-500 uppercase">Facebook Reels</p>
                <p class="text-xl font-mono text-white">$0.00</p>
            </div>
            <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800">
                <p class="text-xs text-gray-500 uppercase">TikTok / YT Shorts</p>
                <p class="text-xl font-mono text-white">$0.00</p>
            </div>
            <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 text-center">
                <p class="text-xs text-gray-500 uppercase">Vistas Totales</p>
                <p class="text-xl font-mono text-red-400">0</p>
            </div>
        </div>

        <div class="bg-gray-900 rounded-3xl border border-gray-800 overflow-hidden">
            <div class="p-6 border-b border-gray-800">
                <h2 class="text-sm font-bold uppercase tracking-widest text-red-500">Plan de Producción</h2>
            </div>
            <div class="p-6 space-y-4">
                <div class="flex items-center justify-between p-3 bg-black rounded-xl border border-gray-800">
                    <span class="text-sm">Video 1: Proceso de Grabado (Timelapse)</span>
                    <span class="text-xs px-2 py-1 bg-red-900 text-red-100 rounded">Pendiente</span>
                </div>
                <div class="flex items-center justify-between p-3 bg-black rounded-xl border border-gray-800 opacity-50">
                    <span class="text-sm">Video 2: Demo de Juego "Car Wash"</span>
                    <span class="text-xs px-2 py-1 bg-gray-700 text-gray-300 rounded">Próximamente</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
